<!DOCTYPE html>
<html lang="pt"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>teste · iframe real</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--aqua:#86D1C4;--orange:#F28C48;--areia:#F7EFE5;--verde:#1A3530}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--areia);color:var(--verde);line-height:1.55}
.wrap{max-width:480px;margin:0 auto;padding:24px}
.note{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--orange);text-align:center;margin:6px 0 18px}
.label{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--aqua);display:block;margin-bottom:10px}
.door-travel{background:var(--verde);border-radius:20px;padding:24px;color:var(--areia)}
.door-travel p.lead{font-size:14.5px;line-height:1.5;margin-bottom:18px;color:rgba(247,239,229,.92)}
.btn{display:block;text-align:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;letter-spacing:-.02em;text-transform:lowercase;border-radius:999px;padding:15px 20px;border:none;cursor:pointer;width:100%;background:var(--orange);color:var(--verde);font-size:17px}
.chevron{display:inline-block;transition:transform .3s;margin-left:6px}
.open .chevron{transform:rotate(180deg)}
.slot{max-height:0;overflow:hidden;transition:max-height .5s ease}
.open .slot{max-height:600px;margin-top:16px}
.frame-box{background:#fff;border-radius:12px;overflow:hidden;border:1px solid rgba(0,0,0,.08)}
iframe{width:100%;height:560px;border:none;display:block}
</style></head>
<body>
<div class="wrap">
  <p class="note">↓ teste forma 1 · formulário REAL embutido ↓</p>
  <section class="door-travel" id="door">
    <span class="label">PLANEAR A TUA VIAGEM</span>
    <p class="lead">Planeio cada detalhe com o olhar de quem já lá esteve. Orçamento gratuito, para quem quer viajar com critério.</p>
    <button class="btn" onclick="document.getElementById('door').classList.toggle('open')">
      pedir o meu orçamento <span class="chevron">▾</span>
    </button>
    <div class="slot">
      <div class="frame-box">
        <iframe src="https://mango-profit-f43.notion.site/32972206687b80e198deed23e5ed02c1" loading="lazy"></iframe>
      </div>
    </div>
  </section>
</div>
</body></html>
